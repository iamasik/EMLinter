<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="EMLinter">
  <title>EMLinter</title>
  <desc>An envelope marked with code brackets and a verified check — HTML email, linted.</desc>
  <defs>
    <!-- Brand badge gradient: brand-500 -> accent-500 -->
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="0.45" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Top-left gloss echoing the site's shadow-glow -->
    <radialGradient id="gloss" cx="0.3" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square badge (matches header rounded-lg, ~25% radius) -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#badge)"/>
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#gloss)"/>

  <!-- Envelope body -->
  <rect x="88" y="150" width="336" height="232" rx="30" fill="#ffffff"/>
  <!-- Envelope flap -->
  <path d="M104 172 L256 288 L408 172" fill="none" stroke="#cdd1e0" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Code brackets </> — HTML email -->
  <g stroke="#ec4899" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M206 268 L172 306 L206 344"/>
    <path d="M306 268 L340 306 L306 344"/>
  </g>
  <path d="M270 262 L242 350" stroke="#8b5cf6" stroke-width="24" stroke-linecap="round" fill="none"/>

  <!-- Verified check badge — linted/validated -->
  <circle cx="392" cy="360" r="66" fill="url(#check)" stroke="#ffffff" stroke-width="14"/>
  <path d="M364 360 L385 381 L422 340" fill="none" stroke="#ffffff" stroke-width="19" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
